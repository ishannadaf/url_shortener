<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- Navbar -->
<div class="bg-gray-800 p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">🚀 URL Shortener</h1>

    <div class="space-x-4">
        <a href="/" class="hover:text-blue-400">Home</a>
        <a href="/dashboard/" class="hover:text-blue-400">Dashboard</a>
    </div>
</div>

<h1 class="text-3xl font-bold mb-6 text-center mt-6">📊 URL Analytics Dashboard</h1>

<!-- Table -->
<div class="overflow-x-auto px-10">
    <table class="min-w-full bg-gray-800 rounded-lg overflow-hidden">
        <thead class="bg-gray-700">
            <tr>
                <th class="p-3">Short URL</th>
                <th class="p-3">Original URL</th>
                <th class="p-3">Clicks</th>
                <th class="p-3">Created At</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
async function loadData() {
    try {
        const res = await fetch('/api/stats/');
        const data = await res.json();

        const table = document.getElementById('tableBody');
        table.innerHTML = "";

        data.forEach(item => {
            table.innerHTML += `
                <tr class="border-b border-gray-700 hover:bg-gray-700">
                    <td class="p-3 text-blue-400">
                        <a href="/${item.short_code}" target="_blank">
                            ${window.location.origin}/${item.short_code}
                        </a>
                    </td>
                    <td class="p-3">${item.original_url}</td>
                    <td class="p-3 text-center">${item.click_count}</td>
                    <td class="p-3">${item.created_at}</td>
                </tr>
            `;
        });
    } catch (error) {
        console.error("Error loading data:", error);
    }
}

loadData();
</script>

</body>
</html>
